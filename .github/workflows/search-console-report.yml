name: Weekly Search Console report

on:
  schedule:
    # Mondays at 13:00 UTC (~9am US Eastern)
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check that the Search Console secret is configured
        id: check
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
        run: |
          if [ -z "$GSC_SA_KEY" ]; then
            echo "GSC_SA_KEY secret is not set yet — skipping. Add it in repo Settings → Secrets and variables → Actions."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.configured == 'true'

      - name: Generate report
        if: steps.check.outputs.configured == 'true'
        env:
          GSC_SA_KEY: ${{ secrets.GSC_SA_KEY }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
          ADSENSE_OAUTH_CLIENT_ID: ${{ secrets.ADSENSE_OAUTH_CLIENT_ID }}
          ADSENSE_OAUTH_CLIENT_SECRET: ${{ secrets.ADSENSE_OAUTH_CLIENT_SECRET }}
          ADSENSE_REFRESH_TOKEN: ${{ secrets.ADSENSE_REFRESH_TOKEN }}
        run: npm run gsc:report

      - name: Commit report
        if: steps.check.outputs.configured == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: weekly Search Console report"
            git push
          fi

      - name: Open summary issue
        if: steps.check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Search Console weekly report — $(date -u +%F)" \
            --body-file reports/latest.md
